<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DupScreen – Network Monitor</title>
  <link rel="stylesheet" href="network.css">
</head>
<body>
  <div class="app">
    <!-- Top Bar -->
    <header class="toolbar">
      <div class="toolbar-left">
        <svg class="logo" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="8" height="18" rx="1"/><rect x="14" y="3" width="8" height="18" rx="1"/>
        </svg>
        <span class="toolbar-title">Network Monitor</span>
        <span id="statusBadge" class="status-badge stopped">Stopped</span>
      </div>
      <div class="toolbar-controls">
        <input id="filterInput" class="filter-input" type="text" placeholder="Filter URLs..." />
        <span id="entryCount" class="entry-count"></span>
        <button id="btnClear" class="btn btn-sm btn-clear">Clear</button>
      </div>
    </header>

    <!-- Main content -->
    <div class="main">
      <!-- Request list -->
      <div class="list-panel">
        <div class="list-header">
          <span class="col-method">Method</span>
          <span class="col-widget">Widget</span>
          <span class="col-url">URL</span>
          <span class="col-status">Status</span>
          <span class="col-time">Time</span>
        </div>
        <div id="requestList" class="request-list"></div>
        <div id="emptyState" class="empty-state">
          No captured requests yet.<br>Use the <strong>DupScreen panel</strong> to start capture.
        </div>
      </div>

      <!-- Detail / comparison panel -->
      <div id="detailPanel" class="detail-panel hidden">
        <div class="detail-header">
          <span id="detailTitle" class="detail-title"></span>
          <button id="btnCloseDetail" class="btn-icon" title="Close">&times;</button>
        </div>
        <div class="compare-container">
          <div class="compare-col">
            <div class="compare-label">Request Payload</div>
            <pre id="requestPayload" class="json-view"></pre>
          </div>
          <div class="compare-col">
            <div class="compare-label">Response Body</div>
            <pre id="responsePayload" class="json-view"></pre>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="network.js"></script>
</body>
</html>
